[build]
  publish = "dist"
  command = "npm run build"

# SPA routing — all paths fall back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# --- Cache headers ---

# index.html: NEVER cache at CDN or browser level
# This is critical — stale index.html = blank page after deploy
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Service worker: must never be cached (browser checks for updates)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Vite-hashed JS/CSS assets: safe to cache forever (content-addressed)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static files (images, icons, manifest): cache with short revalidation
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
